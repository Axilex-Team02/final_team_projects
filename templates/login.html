<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Axilex CMS</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <div class="auth-header">
                <a href="/" class="logo justify-center mb-2" style="font-size: 2rem;">
                    <i class="fa-solid fa-bolt"></i> AXILEX
                </a>
                <h2>Welcome Back</h2>
                <p style="color: var(--text-light)">Sign in to your account</p>
            </div>
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <div class="flex justify-between items-center mb-4">
                    <label class="flex items-center gap-1" style="font-size: 0.875rem; color: var(--text-light); cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="font-size: 0.875rem;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Log In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="/register" style="font-weight: 600;">Sign up</a>
            </div>
        </div>
    </div>
</body>
</html>
